
services:
  # Higress 主服务
  higress-ai:
    image: higress:v2.1.9
    container_name: higress-ai
    environment:
      - O11Y=on
    ports:
      - "8001:8001"
      - "8088:8080"
      - "8443:8443"
    volumes:
      - /home/wangtao/higress/higress:/data
    networks:
      - mag_network
    depends_on:
      - higress-redis
      - higress-qdrant
    restart: unless-stopped

  # Redis 服务
  higress-redis:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/redis-stack-server:7.4.0-v3
    container_name: higress-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mag_network
    restart: unless-stopped

  # Plugin Server 服务
  higress-plugin-server:
    image: higress-plugin-server:1.0.0
    container_name: higress-plugin-server
    ports:
      - "8090:8080"
    networks:
      - mag_network
    restart: unless-stopped

  # Qdrant 向量数据库服务
  higress-qdrant:
    image: qdrant/qdrant
    container_name: higress-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/wangtao/higress/qdrant_storage:/qdrant/storage:z
    networks:
      - mag_network
    restart: unless-stopped

  # GPUStack 模型部署平台
  gpustack-server:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-gpustack}/gpustack:${GPUSTACK_TAG:-latest}
    container_name: gpustack-server
    restart: unless-stopped
    volumes:
      - gpustack-data:/var/lib/gpustack
    ports:
      - "8899:80"
      - "10161:10161"
    networks:
      - mag_network

  # MAG 后端服务
  mag-backend:
    build:
      context: ../..
      dockerfile: ./docker/mag_services/Dockerfile
    container_name: mag-backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "9999:9999"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mag_network

  # Nginx - 反向代理 + 前端静态资源服务
  nginx:
    image: nginx:1.27-alpine
    container_name: mag-nginx
    restart: always
    ports:
      - "0.0.0.0:${MAG_NGINX_PORT:-8888}:80"
    env_file:
      - ./.env
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./generate-config.sh:/docker-entrypoint.d/40-generate-config.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - higress-ai
    networks:
      - mag_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # MongoDB
  mongodb:
    image: mongodb/mongodb-community-server:8.2.1-ubuntu2204-20251113T064937Z
    container_name: mongodb
    restart: always
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mag_network
    command: ["--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # MongoDB Express
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_OPTIONS_EDITORTHEME: ambiance
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mag_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # MinIO
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: always
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9010}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    networks:
      - mag_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

networks:
  mag_network:
    driver: bridge

volumes:
  redis-data:
  gpustack-data:
  mongodb_data:
  mongodb_config:
  minio_data:
