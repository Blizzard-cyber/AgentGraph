## for MemMachine
logging:
  path: mem-machine.log
  level: info #| debug | error

server:
  host: 0.0.0.0
  port: 8880

episode_store:
  database: profile_storage

episodic_memory:
  long_term_memory:
    embedder: openai_embedder
    reranker: my_reranker_id
    vector_graph_store: my_storage_id
  short_term_memory:
    llm_model: openai_model
    message_capacity: 500

semantic_memory:
  llm_model: openai_model
  embedding_model: openai_embedder
  database: profile_storage

session_manager:
  database: profile_storage

prompt:
  session:
  - profile_prompt

resources:
  databases:
    profile_storage:
      provider: postgres
      config:
        host: postgres
        port: 5432
        user: memmachine
        db_name: memmachine
        password: memmachine_password
    my_storage_id:
      provider: neo4j
      config:
        uri: 'bolt://neo4j:7697'
        username: neo4j
        password: neo4j_password
    sqlite_test:
      provider: sqlite
      config:
        path: sqlite_test.db
  embedders:
    openai_embedder:
      provider: openai
      config:
        model: "Qwen3-Embedding-0.6B"
        api_key: gpustack_bae0ff7c11bc5e9b_0c1b0318cbf420b3c9e039c1516805e5
        base_url: "http://192.168.1.90:8088/v1"
        dimensions: 1024
    ollama_embedder:
      provider: openai
      config:
        model: "Qwen3-Embedding-0.6B"
        api_key: gpustack_bae0ff7c11bc5e9b_0c1b0318cbf420b3c9e039c1516805e5
        base_url: "http://192.168.1.90:8088/v1"
        dimensions: 1024

  language_models:
    openai_model:
      provider: openai-chat-completions
      config:
        model: "Qwen3-4B"
        api_key: gpustack_bae0ff7c11bc5e9b_0c1b0318cbf420b3c9e039c1516805e5
        base_url: "http://192.168.1.90:8088/v1"
    ollama_model:
      provider: openai-chat-completions
      config:
        model: "Qwen3-4B"
        api_key: gpustack_bae0ff7c11bc5e9b_0c1b0318cbf420b3c9e039c1516805e5
        base_url: "http://192.168.1.90:8088/v1"

  rerankers:
    my_reranker_id:
      provider: "rrf-hybrid"
      config:
        reranker_ids:
          - id_ranker_id
          - bm_ranker_id
          - ce_ranker_id
    id_ranker_id:
      provider: "identity"
    bm_ranker_id:
      provider: "bm25"
    ce_ranker_id:
      provider: "cross-encoder"
      config:
        model_name: "cross-encoder/qnli-electra-base"
