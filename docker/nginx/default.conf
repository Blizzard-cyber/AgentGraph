# Nginx 配置 - 反向代理 FastAPI 后端并直接服务前端静态资源
# 该配置文件会被复制到 /etc/nginx/conf.d/default.conf 中
# 注意: 前端构建产物(./frontend/dist) 会被挂载到 /usr/share/nginx/html

server {
    listen       80;
    server_name  _;

    # 服务前端静态文件
    location / {
        root   /usr/share/nginx/html; # 前端文件根目录
        index  index.html index.htm; # 默认首页
        try_files $uri $uri/ /index.html; # 支持前端路由（如Vue/React）
    }

    # 反向代理 /api/ 路径到 FastAPI 后端服务
    location /api/ {
        proxy_pass http://192.168.1.85:8088;    
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }



    # 日志
    access_log  /var/log/nginx/mag_access.log;
    error_log   /var/log/nginx/mag_error.log;
}

